# aaai — Release workflow
# Triggered by a version tag (v0.6.0, v1.0.0, etc.).
# Builds binaries for Linux / macOS / Windows, then creates a GitHub Release.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p aaai-cli

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          TAG=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          mkdir -p dist
          cp target/$TARGET/release/aaai dist/
          tar czf dist/aaai-${TAG}-${TARGET}.tar.gz -C dist aaai
          echo "ASSET=dist/aaai-${TAG}-${TARGET}.tar.gz" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $TARGET = "${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\$TARGET\release\aaai.exe" "dist\"
          Compress-Archive -Path "dist\aaai.exe" -DestinationPath "dist\aaai-$TAG-$TARGET.zip"
          echo "ASSET=dist/aaai-$TAG-$TARGET.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaai-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1)
          echo "NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: aaai ${{ github.ref_name }}
          body: ${{ env.NOTES }}
          files: dist/**
          draft: false
          prerelease: false
