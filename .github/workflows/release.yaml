# aaai — Release workflow
# Triggered by a version tag (v0.10.1, v1.0.0, etc.).
# RFC 091 — builds both CLI and GUI binaries for every supported target;
# produces per-component and combined archives for Windows.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: ".exe"
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI release binary
        run: cargo build --release --target ${{ matrix.target }} -p aaai-cli

      # RFC 091 §6.1 — build GUI for every release target.
      - name: Build GUI release binary
        run: cargo build --release --target ${{ matrix.target }} -p aaai-gui

      # ── Windows: three archives (CLI-only, GUI-only, full) ──────────────
      - name: Create release archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG    = $env:GITHUB_REF_NAME
          $TARGET = "${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist\cli, dist\gui, dist\full

          Copy-Item "target\$TARGET\release\aaai.exe"     "dist\cli\"
          Copy-Item "target\$TARGET\release\aaai-gui.exe" "dist\gui\"
          Copy-Item "target\$TARGET\release\aaai.exe"     "dist\full\"
          Copy-Item "target\$TARGET\release\aaai-gui.exe" "dist\full\"

          Compress-Archive -Path "dist\cli\*"  -DestinationPath "dist\aaai-cli-$TAG-$TARGET.zip"
          Compress-Archive -Path "dist\gui\*"  -DestinationPath "dist\aaai-gui-$TAG-$TARGET.zip"
          Compress-Archive -Path "dist\full\*" -DestinationPath "dist\aaai-full-$TAG-$TARGET.zip"

          # Export all three paths for the upload step
          "ASSET_CLI=dist/aaai-cli-$TAG-$TARGET.zip"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_GUI=dist/aaai-gui-$TAG-$TARGET.zip"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_FULL=dist/aaai-full-$TAG-$TARGET.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Linux / macOS: separate CLI and GUI archives ────────────────────
      - name: Create release archives (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          TAG=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          mkdir -p dist

          # CLI archive
          cp target/$TARGET/release/aaai dist/
          tar czf dist/aaai-cli-${TAG}-${TARGET}.tar.gz -C dist aaai
          rm dist/aaai

          # GUI archive
          cp target/$TARGET/release/aaai-gui dist/
          tar czf dist/aaai-gui-${TAG}-${TARGET}.tar.gz -C dist aaai-gui
          rm dist/aaai-gui

          echo "ASSET_CLI=dist/aaai-cli-${TAG}-${TARGET}.tar.gz"  >> $GITHUB_ENV
          echo "ASSET_GUI=dist/aaai-gui-${TAG}-${TARGET}.tar.gz"  >> $GITHUB_ENV

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaai-cli-${{ matrix.target }}
          path: ${{ env.ASSET_CLI }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaai-gui-${{ matrix.target }}
          path: ${{ env.ASSET_GUI }}

      # Windows-only: also upload the combined full archive
      - name: Upload full artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aaai-full-${{ matrix.target }}
          path: ${{ env.ASSET_FULL }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract changelog entry
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1)
          echo "NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: aaai ${{ github.ref_name }}
          body: ${{ env.NOTES }}
          files: dist/**
