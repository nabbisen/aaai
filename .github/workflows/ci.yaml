# aaai — Continuous Integration
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build -p aaai-cli -p aaai-core

      - name: Unit tests
        run: cargo test -p aaai-core --lib

      - name: Integration tests
        run: cargo test -p aaai-cli -- --test-threads=1

  check-msrv:
    name: MSRV (Rust 1.91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p aaai-core -p aaai-cli

  audit-security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # RFC 018 §3.4 — i18n key hygiene.
  # Static check that every t!("...") key in aaai-gui/src has an entry in
  # both locales/en.yaml and locales/ja.yaml. This blocks merges: a MISSING
  # key would cause the GUI to render its literal key string (e.g. the user
  # sees "toolbar.failed" instead of "Failed").
  i18n-key-audit:
    name: i18n key audit (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PyYAML
        run: |
          python3 -m pip install --user pyyaml
      - name: Cross-check t!() keys against locale YAML files
        run: |
          chmod +x scripts/check-i18n-keys.py
          scripts/check-i18n-keys.py

  # RFC 017 — Visual Verification Harness.
  # This step is informational only: it lists RFCs in rfcs/done/ that still
  # lack a `## Visual Verification` card. It MUST NOT fail the build.
  # Run it on every push/PR so the count stays visible in CI logs and PR
  # discussions can reference current state.
  visual-verification-status:
    name: Visual verification status (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: List unverified RFCs
        run: |
          chmod +x scripts/list-unverified-rfcs.sh
          scripts/list-unverified-rfcs.sh
        # Intentionally no --strict; this step never blocks merges.
        # See RFC 017 §2.3.

  # RFC 027 — mdbook build smoke test.
  # Catches the class of bugs that Phase 12 surfaced: orphan chapters
  # (`abdd-audit.md` was missing from SUMMARY), broken cross-references,
  # encoding issues, and malformed markdown. Runs on every push/PR.
  # This step IS blocking — broken docs are not worth merging.
  docs-build:
    name: mdbook build (en + ja)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdbook
        # --no-default-features drops the search-index generator, which is
        # unused in CI and roughly halves the install time. Pin to ^0.4 so
        # a future 0.5 release doesn't silently change rendering. See
        # RFC 027 §3 for the trade-off rationale.
        run: cargo install mdbook --version "^0.4" --no-default-features
      - name: Build English book
        run: mdbook build docs/
      - name: Build Japanese book
        run: mdbook build docs/ja/
