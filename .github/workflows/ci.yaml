# aaai — Continuous Integration
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # RFC 091 §11.1 — GUI must compile on all CI platforms.
      - name: Build
        run: cargo build -p aaai-core -p aaai-cli -p aaai-gui

      - name: Unit tests
        run: cargo test -p aaai-core --lib

      - name: Integration tests
        run: cargo test -p aaai-cli -- --test-threads=1

  # RFC 091 §5.1 — dedicated Windows GUI build job guarantees the GUI binary
  # compiles on the target Store platform even if the main matrix is ever
  # narrowed to Linux-only.
  windows-gui-build:
    name: Windows GUI build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI
        run: cargo build -p aaai-gui

  check-msrv:
    name: MSRV (Rust 1.91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91
      - uses: Swatinem/rust-cache@v2
      # RFC 091 §5.2 — include GUI in MSRV check.
      # If GUI dependencies raise the MSRV above 1.91 in future, update the
      # workspace rust-version field and document the reason.
      - run: cargo check -p aaai-core -p aaai-cli -p aaai-gui

  audit-security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # RFC 018 §3.4 — i18n key hygiene.
  # Static check that every t!("...") key in aaai-gui/src has an entry in
  # both locales/en.yaml and locales/ja.yaml. This blocks merges: a MISSING
  # key would cause the GUI to render its literal key string (e.g. the user
  # sees "toolbar.failed" instead of "Failed").
  i18n-key-audit:
    name: i18n key audit (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PyYAML
        run: |
          python3 -m pip install --user pyyaml
      - name: Cross-check t!() keys against locale YAML files
        run: |
          chmod +x scripts/check-i18n-keys.py
          scripts/check-i18n-keys.py

  # RFC 017 — Visual Verification Harness.
  # This step is informational only: it lists RFCs in rfcs/done/ that still
  # lack a `## Visual Verification` card. It MUST NOT fail the build.
  visual-verification-status:
    name: Visual verification status (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: List unverified RFCs
        run: |
          chmod +x scripts/list-unverified-rfcs.sh
          scripts/list-unverified-rfcs.sh
        # Intentionally no --strict; this step never blocks merges.
        # See RFC 017 §2.3.

  # RFC 027 — mdbook build smoke test.
  docs-build:
    name: mdbook build (en + ja)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdbook
        run: cargo install mdbook --version "^0.4" --no-default-features
      - name: Build English book
        run: mdbook build docs/
      - name: Build Japanese book
        run: mdbook build docs/ja/
