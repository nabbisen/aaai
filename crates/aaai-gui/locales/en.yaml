error:
  opening:
    before_not_found:
      message: 'Before folder not found: %{path}'
      hint: Pick a folder that exists, or create the folder before starting the audit.
    after_not_found:
      message: 'After folder not found: %{path}'
      hint: Pick a folder that exists, or create the folder before starting the audit.
    definition_load_failed:
      message: 'Failed to load audit definition: %{reason}'
      hint: Check the YAML is well-formed, or regenerate it with `aaai snap`.
    drop_invalid_kind:
      message: 'Dropped item is not a folder: %{path}'
      hint: Drop a folder (not a file) onto either card.
  diff:
    failed:
      message: 'Folder comparison failed: %{reason}'
      hint: Make sure both folders are readable and try again.
