error:
  opening:
    before_not_found:
      message: 'Before folder not found: %{path}'
      hint: Pick a folder that exists, or create the folder before starting the audit.
    after_not_found:
      message: 'After folder not found: %{path}'
      hint: Pick a folder that exists, or create the folder before starting the audit.
    definition_load_failed:
      message: 'Failed to load audit definition: %{reason}'
      hint: Check the YAML is well-formed, or regenerate it with `aaai snap`.
    drop_invalid_kind:
      message: 'Dropped item is not a folder: %{path}'
      hint: Drop a folder (not a file) onto either card.
    before_required:
      message: Before folder is required.
    after_required:
      message: After folder is required.
    folder_missing:
      message: Folder not found.
    not_a_directory:
      message: Path is not a directory.
  diff:
    failed:
      message: 'Folder comparison failed: %{reason}'
      hint: Make sure both folders are readable and try again.
  inspector:
    invalid_regex:
      message: The regular expression couldn't be parsed.
      hint: Test your pattern at regex101.com to find the issue.
    invalid_sha256:
      message: Must be exactly 64 hex characters.
      hint: Generate one with `sha256sum filename`, or copy the value from an earlier
        audit run.
    empty_rules:
      message: At least one rule is required.
      hint: Click the `+ Add rule` button below to define what line changes are allowed.
    empty_rule_line:
      message: Rule line cannot be empty.
    empty_expected:
      message: Expected content cannot be empty.
    expires_at_format:
      message: Use YYYY-MM-DD format.
    reason_required:
      message: Reason is required before approval.
  save:
    failed:
      message: Couldn't write the audit definition file.
      hint: Check the file isn't open in another application, or pick a different
        output location.
  batch:
    reason_required:
      message: Reason must not be empty.
