error:
  opening:
    before_not_found:
      message: 'Before フォルダが見つかりません: %{path}'
      hint: 存在するフォルダを選び直すか、フォルダを作成してから監査を開始してください。
    after_not_found:
      message: 'After フォルダが見つかりません: %{path}'
      hint: 存在するフォルダを選び直すか、フォルダを作成してから監査を開始してください。
    definition_load_failed:
      message: '監査定義の読み込みに失敗しました: %{reason}'
      hint: YAML 形式が正しいか確認するか、`aaai snap` で再生成してください。
    drop_invalid_kind:
      message: 'ドロップされたのはフォルダではありません: %{path}'
      hint: ファイルではなくフォルダをカード上にドロップしてください。
    before_required:
      message: Before フォルダを指定してください。
    after_required:
      message: After フォルダを指定してください。
    folder_missing:
      message: フォルダが見つかりません。
    not_a_directory:
      message: 指定されたパスはフォルダではありません。
  diff:
    failed:
      message: 'フォルダ比較に失敗しました: %{reason}'
      hint: 両方のフォルダの読み取り権限を確認し、再度実行してください。
  inspector:
    invalid_regex:
      message: 正規表現を解析できませんでした。
      hint: regex101.com でパターンをテストして問題を特定してください。
    invalid_sha256:
      message: ちょうど 64 文字の 16 進数である必要があります。
      hint: '`sha256sum filename` で生成するか、過去の監査実行結果から値をコピーしてください。'
    empty_rules:
      message: 少なくとも 1 つのルールが必要です。
      hint: 下の `+ ルール追加` ボタンをクリックして、許容する行変更を定義してください。
    empty_rule_line:
      message: ルールの行を空にできません。
    empty_expected:
      message: 期待する内容を空にできません。
    expires_at_format:
      message: YYYY-MM-DD 形式で入力してください。
    reason_required:
      message: 承認前に理由を入力してください。
  save:
    failed:
      message: 監査定義ファイルを書き込めませんでした。
      hint: 別のアプリで開いていないか、または別の出力先を指定してください。
  batch:
    reason_required:
      message: 理由を入力してください。
